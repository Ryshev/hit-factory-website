<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HF Logo Export</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
    }

    .logo {
      width: 1080px;
      height: 1080px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e23a6e, #6c3ce0, #00b4ff);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-inner {
      width: 1000px;
      height: 1000px;
      border-radius: 50%;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .hit {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 194px;
      letter-spacing: 32px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #e23a6e, #6c3ce0, #00b4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }

    .factory {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 103px;
      letter-spacing: 48px;
      text-transform: uppercase;
      color: #999;
      line-height: 1;
    }

    /* Button to save as PNG */
    .save-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      padding: 14px 28px;
      background: linear-gradient(135deg, #e23a6e, #6c3ce0);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .save-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <button class="save-btn" onclick="saveLogo()">💾 Save as PNG (1080×1080)</button>

  <div class="logo" id="logo">
    <div class="logo-inner">
      <span class="hit">HIT</span>
      <span class="factory">FACTORY</span>
    </div>
  </div>

  <script>
    async function saveLogo() {
      const btn = document.querySelector('.save-btn');
      btn.style.display = 'none';

      const canvas = document.createElement('canvas');
      canvas.width = 1080;
      canvas.height = 1080;
      const ctx = canvas.getContext('2d');

      // Use html2canvas-like approach via SVG foreignObject
      const logoEl = document.getElementById('logo');
      const html = logoEl.outerHTML;
      const styles = document.querySelectorAll('style');
      let cssText = '';
      styles.forEach(s => cssText += s.textContent);

      // Simpler approach: use native canvas drawing
      const svgData = `
        <svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080">
          <foreignObject width="1080" height="1080">
            <div xmlns="http://www.w3.org/1999/xhtml">
              <style>
                @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap');
                ${cssText}
              </style>
              ${html}
            </div>
          </foreignObject>
        </svg>`;

      const blob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const img = new Image();

      img.onload = () => {
        ctx.drawImage(img, 0, 0);
        URL.revokeObjectURL(url);

        canvas.toBlob((pngBlob) => {
          const link = document.createElement('a');
          link.download = 'hitfactory-logo-1080.png';
          link.href = URL.createObjectURL(pngBlob);
          link.click();
          URL.revokeObjectURL(link.href);
          btn.style.display = '';
        }, 'image/png');
      };

      img.onerror = () => {
        // Fallback: simple screenshot instruction
        alert('Auto-export failed due to browser security.\n\nUse this instead:\n1. Press F12 → Console\n2. Paste: document.querySelector(".save-btn").remove()\n3. Press Ctrl+Shift+P → "Capture screenshot" → Full size');
        btn.style.display = '';
      };

      img.src = url;
    }
  </script>

</body>
</html>
